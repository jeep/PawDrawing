name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest
        env:
          FLASK_SECRET_KEY: testing-secret-not-for-production

  deploy:
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: production
      url: https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Start Azure Web App
        run: az webapp start --resource-group PawDrawing-rg --name ${{ vars.AZURE_WEBAPP_NAME }}

      - name: Wait For Web App To Be Running
        run: |
          for i in {1..12}; do
            state=$(az webapp show --resource-group PawDrawing-rg --name ${{ vars.AZURE_WEBAPP_NAME }} --query state -o tsv)
            echo "Current app state: ${state}"
            if [ "${state}" = "Running" ]; then
              exit 0
            fi
            sleep 5
          done
          echo "Web app did not reach Running state in time"
          exit 1

      - name: Deploy to Azure Web App
        run: az webapp up --resource-group PawDrawing-rg --name ${{ vars.AZURE_WEBAPP_NAME }} --runtime "PYTHON:3.12"
