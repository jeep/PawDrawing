{% extends "base.html" %}

{% block title %}PawDrawing — Select Source{% endblock %}

{% block nav %}
<form method="POST" action="{{ url_for('main.logout') }}" style="display:inline">
    <button type="submit" style="background:none;border:none;color:#ecf0f1;cursor:pointer;font-size:0.9rem;">
        Logout ({{ session.get('tte_username', '') }})
    </button>
</form>
{% endblock %}

{% block extra_css %}
<style>
    .select-card {
        max-width: 550px;
        margin: 3rem auto;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        padding: 2rem;
    }
    .select-card h2 { margin-bottom: 1.5rem; color: #2c3e50; }
    .section-label {
        font-weight: 600;
        font-size: 0.95rem;
        margin-bottom: 0.4rem;
        display: block;
    }
    .form-row { margin-bottom: 1.5rem; }
    .form-row input[type="text"] {
        width: 100%;
        padding: 0.6rem 0.75rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 1rem;
    }
    .form-row input:focus {
        outline: none;
        border-color: #2c3e50;
        box-shadow: 0 0 0 2px rgba(44,62,80,0.15);
    }
    .divider {
        text-align: center;
        margin: 1.5rem 0;
        color: #999;
        font-size: 0.85rem;
    }
    .divider::before, .divider::after {
        content: "";
        display: inline-block;
        width: 35%;
        height: 1px;
        background: #ddd;
        vertical-align: middle;
        margin: 0 0.75rem;
    }
    .search-results {
        list-style: none;
        border: 1px solid #ddd;
        border-radius: 4px;
        max-height: 200px;
        overflow-y: auto;
        margin-top: 0.4rem;
        display: none;
    }
    .search-results li {
        padding: 0.6rem 0.75rem;
        cursor: pointer;
        border-bottom: 1px solid #eee;
    }
    .search-results li:last-child { border-bottom: none; }
    .search-results li:hover { background: #f0f4f8; }
    .search-hint {
        font-size: 0.8rem;
        color: #999;
        margin-top: 0.3rem;
    }
    .btn-proceed {
        width: 100%;
        padding: 0.7rem;
        background: #2c3e50;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 1rem;
        cursor: pointer;
        font-weight: 600;
    }
    .btn-proceed:hover { background: #34495e; }
    .btn-proceed:disabled { background: #95a5a6; cursor: not-allowed; }
    .tab-bar {
        display: flex;
        border-bottom: 2px solid #eee;
        margin-bottom: 1.5rem;
    }
    .tab-bar button {
        flex: 1;
        padding: 0.75rem;
        background: none;
        border: none;
        border-bottom: 3px solid transparent;
        font-size: 0.95rem;
        font-weight: 600;
        color: #999;
        cursor: pointer;
        transition: 0.2s;
    }
    .tab-bar button.active {
        color: #2c3e50;
        border-bottom-color: #2c3e50;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .library-list {
        list-style: none;
        border: 1px solid #ddd;
        border-radius: 4px;
        max-height: 200px;
        overflow-y: auto;
        margin-top: 0.4rem;
        padding: 0;
        display: none;
    }
    .library-list li {
        padding: 0.6rem 0.75rem;
        cursor: pointer;
        border-bottom: 1px solid #eee;
    }
    .library-list li:last-child { border-bottom: none; }
    .library-list li:hover { background: #f0f4f8; }
</style>
{% endblock %}

{% block content %}
<div class="select-card">
    <div class="tab-bar">
        <button type="button" class="active" data-tab="convention-tab">Convention</button>
        <button type="button" data-tab="library-tab">Library Only</button>
    </div>

    <div id="convention-tab" class="tab-panel active">
        <div class="form-row">
            <label class="section-label" for="search">Search by name</label>
            <input type="text" id="search" placeholder="Type convention name..." autocomplete="off">
            <div class="search-hint" id="search-hint">Type at least 2 characters to search</div>
            <ul class="search-results" id="search-results"></ul>
        </div>

        <div class="divider">or</div>

        <form method="POST" action="{{ url_for('main.convention_select_route') }}" id="select-form">
            <div class="form-row">
                <label class="section-label" for="convention_id">Paste Convention ID</label>
                <input type="text" id="convention_id" name="convention_id"
                       placeholder="e.g. ABCD1234-5678-90EF-...">
            </div>
            <button type="submit" class="btn-proceed" id="btn-proceed">Load Convention</button>
        </form>
    </div>

    <div id="library-tab" class="tab-panel">
        <div class="form-row">
            <label class="section-label">My Libraries</label>
            <button type="button" class="btn-proceed" id="browse-libraries" style="margin-bottom:0.5rem;">Browse My Libraries</button>
            <div class="search-hint" id="library-hint"></div>
            <ul class="library-list" id="library-list"></ul>
        </div>

        <div class="divider">or</div>

        <form method="POST" action="{{ url_for('main.library_select_route') }}" id="library-form">
            <div class="form-row">
                <label class="section-label" for="library_id">Paste Library ID</label>
                <input type="text" id="library_id" name="library_id"
                       placeholder="e.g. ABCD1234-5678-90EF-...">
            </div>
            <button type="submit" class="btn-proceed" id="btn-library-proceed">Load Library</button>
        </form>
    </div>
</div>

<script>
(function() {
    // ── Tab switching ─────────────────────────────────────────────
    document.querySelectorAll('.tab-bar button').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.dataset.tab).classList.add('active');
        });
    });

    // ── Convention search ─────────────────────────────────────────
    const searchInput = document.getElementById('search');
    const resultsList = document.getElementById('search-results');
    const idInput = document.getElementById('convention_id');
    const hintEl = document.getElementById('search-hint');
    let debounceTimer;

    searchInput.addEventListener('input', function() {
        clearTimeout(debounceTimer);
        const q = this.value.trim();
        if (q.length < 2) {
            resultsList.style.display = 'none';
            resultsList.innerHTML = '';
            hintEl.textContent = 'Type at least 2 characters to search';
            return;
        }
        hintEl.textContent = 'Searching...';
        debounceTimer = setTimeout(() => fetchResults(q), 350);
    });

    function fetchResults(query) {
        fetch('{{ url_for("main.convention_search") }}?q=' + encodeURIComponent(query))
            .then(r => r.json())
            .then(data => {
                hintEl.textContent = '';
                resultsList.innerHTML = '';
                if (data.error) {
                    resultsList.innerHTML = '<li style="color:#b71c1c;cursor:default">' +
                        escapeHtml(data.error) + '</li>';
                    resultsList.style.display = 'block';
                    return;
                }
                if (!data.results || data.results.length === 0) {
                    resultsList.innerHTML = '<li style="color:#999;cursor:default">No conventions found</li>';
                    resultsList.style.display = 'block';
                    return;
                }
                data.results.forEach(function(conv) {
                    const li = document.createElement('li');
                    li.textContent = conv.name;
                    li.addEventListener('click', function() {
                        idInput.value = conv.id;
                        searchInput.value = conv.name;
                        resultsList.style.display = 'none';
                    });
                    resultsList.appendChild(li);
                });
                resultsList.style.display = 'block';
            })
            .catch(() => {
                hintEl.textContent = '';
                resultsList.innerHTML = '<li style="color:#b71c1c;cursor:default">Search failed — please try again</li>';
                resultsList.style.display = 'block';
            });
    }

    // ── Library browsing ──────────────────────────────────────────
    const libraryList = document.getElementById('library-list');
    const libraryIdInput = document.getElementById('library_id');
    const libraryHint = document.getElementById('library-hint');
    const browseBtn = document.getElementById('browse-libraries');

    browseBtn.addEventListener('click', function() {
        browseBtn.disabled = true;
        browseBtn.textContent = 'Loading...';
        libraryHint.textContent = '';

        fetch('{{ url_for("main.library_browse") }}')
            .then(r => r.json())
            .then(data => {
                browseBtn.disabled = false;
                browseBtn.textContent = 'Browse My Libraries';
                libraryList.innerHTML = '';
                if (data.error) {
                    libraryHint.textContent = data.error;
                    libraryHint.style.color = '#b71c1c';
                    libraryList.style.display = 'none';
                    return;
                }
                if (!data.results || data.results.length === 0) {
                    libraryList.innerHTML = '<li style="color:#999;cursor:default">No libraries found</li>';
                    libraryList.style.display = 'block';
                    return;
                }
                data.results.forEach(function(lib) {
                    const li = document.createElement('li');
                    li.textContent = lib.name;
                    li.addEventListener('click', function() {
                        libraryIdInput.value = lib.id;
                        libraryList.style.display = 'none';
                        libraryHint.textContent = 'Selected: ' + lib.name;
                        libraryHint.style.color = '#27ae60';
                    });
                    libraryList.appendChild(li);
                });
                libraryList.style.display = 'block';
            })
            .catch(() => {
                browseBtn.disabled = false;
                browseBtn.textContent = 'Browse My Libraries';
                libraryHint.textContent = 'Failed to load libraries — please try again';
                libraryHint.style.color = '#b71c1c';
            });
    });

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    document.addEventListener('click', function(e) {
        if (!searchInput.contains(e.target) && !resultsList.contains(e.target)) {
            resultsList.style.display = 'none';
        }
    });
})();
</script>
{% endblock %}
