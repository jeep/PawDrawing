{% extends "base.html" %}

{% block title %}PawDrawing — Login{% endblock %}

{% block extra_css %}
<style>
    .login-card {
        max-width: 400px;
        margin: 4rem auto;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        padding: 2rem;
    }
    .login-card h2 {
        margin-bottom: 1.5rem;
        text-align: center;
        color: #2c3e50;
    }
    .form-group {
        margin-bottom: 1.25rem;
    }
    .form-group label {
        display: block;
        margin-bottom: 0.4rem;
        font-weight: 600;
        font-size: 0.9rem;
    }
    .form-group input {
        width: 100%;
        padding: 0.6rem 0.75rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 1rem;
    }
    .form-group input:focus {
        outline: none;
        border-color: #2c3e50;
        box-shadow: 0 0 0 2px rgba(44,62,80,0.15);
    }
    .btn-login {
        width: 100%;
        padding: 0.7rem;
        background: #2c3e50;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 1rem;
        cursor: pointer;
        font-weight: 600;
    }
    .btn-login:hover {
        background: #34495e;
    }
    .password-wrapper {
        position: relative;
    }
    .password-wrapper input {
        padding-right: 2.5rem;
    }
    .toggle-visibility {
        position: absolute;
        right: 0.5rem;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: #888;
        font-size: 1.1rem;
        padding: 0.2rem;
        line-height: 1;
    }
    .toggle-visibility:hover {
        color: #2c3e50;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-card">
    <h2>Log In</h2>
    <form method="POST" action="{{ url_for('main.login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="username">Username or Email Address</label>
            <input type="text" id="username" name="username" required autofocus
                   autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" name="password" required
                       autocomplete="current-password">
                <button type="button" class="toggle-visibility" aria-label="Show password"
                        onclick="toggleVisibility('password', this)">👁</button>
            </div>
        </div>
        <div class="form-group">
            <label for="api_key">API Key</label>
            <div class="password-wrapper">
                <input type="password" id="api_key" name="api_key" required
                       autocomplete="off"
                       placeholder="From your tabletop.events account">
                <button type="button" class="toggle-visibility" aria-label="Show API key"
                        onclick="toggleVisibility('api_key', this)">👁</button>
            </div>
        </div>
        <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.85rem;margin-bottom:1rem;cursor:pointer;">
            <input type="checkbox" id="remember-key" checked>
            Remember API key on this device
        </label>
        <button type="submit" class="btn-login">Log In</button>
    </form>
    {% if session.get('library_id') %}
    <div style="text-align:center; margin-top:1rem; font-size:0.85rem;">
        <a href="{{ url_for('main.volunteer_login') }}">Log in as volunteer</a>
    </div>
    {% endif %}
</div>
<script>
function toggleVisibility(fieldId, btn) {
    const input = document.getElementById(fieldId);
    if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🔒';
        btn.setAttribute('aria-label', btn.getAttribute('aria-label').replace('Show', 'Hide'));
    } else {
        input.type = 'password';
        btn.textContent = '👁';
        btn.setAttribute('aria-label', btn.getAttribute('aria-label').replace('Hide', 'Show'));
    }
}

// Restore API key from localStorage
(function() {
    const saved = localStorage.getItem('pawdrawing_api_key');
    if (saved) {
        document.getElementById('api_key').value = saved;
    }
    const remembered = localStorage.getItem('pawdrawing_remember_key');
    if (remembered === 'false') {
        document.getElementById('remember-key').checked = false;
    }

    document.querySelector('.login-card form').addEventListener('submit', function() {
        const cb = document.getElementById('remember-key');
        const key = document.getElementById('api_key').value.trim();
        localStorage.setItem('pawdrawing_remember_key', cb.checked);
        if (cb.checked && key) {
            localStorage.setItem('pawdrawing_api_key', key);
        } else {
            localStorage.removeItem('pawdrawing_api_key');
        }
    });
})();
</script>
{% endblock %}
