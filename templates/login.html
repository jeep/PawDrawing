{% extends "base.html" %}

{% block title %}PawDrawing — Login{% endblock %}

{% block extra_css %}
<style>
    .login-card {
        max-width: 400px;
        margin: 4rem auto;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        padding: 2rem;
    }
    .login-card h2 {
        margin-bottom: 1.5rem;
        text-align: center;
        color: #2c3e50;
    }
    .form-group {
        margin-bottom: 1.25rem;
    }
    .form-group label {
        display: block;
        margin-bottom: 0.4rem;
        font-weight: 600;
        font-size: 0.9rem;
    }
    .form-group input {
        width: 100%;
        padding: 0.6rem 0.75rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 1rem;
    }
    .form-group input:focus {
        outline: none;
        border-color: #2c3e50;
        box-shadow: 0 0 0 2px rgba(44,62,80,0.15);
    }
    .btn-login {
        width: 100%;
        padding: 0.7rem;
        background: #2c3e50;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 1rem;
        cursor: pointer;
        font-weight: 600;
    }
    .btn-login:hover {
        background: #34495e;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-card">
    <h2>Log In</h2>
    <form method="POST" action="{{ url_for('main.login') }}">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus
                   autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required
                   autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login">Log In</button>
    </form>
</div>
{% endblock %}
